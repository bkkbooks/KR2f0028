body:
  text: 訥溪奏疏明周怡撰吏科給事中臣周怡謹題為督撫大臣罔上不忠乞賜諭責以振風紀事竊惟撫按之臣受天子明命分理一方生民休戚賴以蘇息茍仰思朝廷付託之重一方瞻仰之大則所以惕心飭躬慎官畏法真如負重而涉淵冰寧肯專恣自大廢法徇情自戾官方耶今天下為朝廷牧赤子專則守令次則藩臬為撫按者留意賢否欽慎自嚴則下觀而敬畏生賢者勤而貞志彌篤不肖者憚而非念潛消其利濟一方甚大况甄别嚴明孰敢越志近觀某舉劾方面守令二疏臣等竊不自安者數日某以其官則兵部尚書其權則右都御史其責則提督巡撫其地則兩廣實朝廷之遐方邊徼朝廷所以隆其秩位重其權任非以侈大某之身蓋以逺方之民蒙朝廷之德化視畿甸近藩為逺故命之重臣欲其敷宣皇化覃洽海濵如畿甸近藩甚盛意也為某者肯一念及此其所舉動必不茍且輕易今於兩廣布按二司止舉以市恩獨以一都指揮僉事某劾以藉口兩廣猺獞冦竊東剽西掠日有警傳文德武偹不宜偏有輕重今惟舉文劾武重俎豆而輕介胄非所以為勸豈惟南越之將士憤怏今西地多事之日嬰鋒蹈刃則責之以死命而舉賢旌能獨不録其微長搜瑕索瘢獨於此輩深刻臣恐武夫聞之解體難望其臨敵有血戰死綏之志兩廣所轄郡邑實繁見任守令廢怠官守者寧無數人本官於廣東則劾雷州府知府葉於廣西則劾栁州府知府戴及查本官及巡按同日報缺官本內柳州府知府戴已於四月初五日准告致仕夲官劾疏發於四月二十日據傳聞之言戴於四月初五日已前已經離任回籍去訖又查嘉靖二十一年十一月日本官報缺官本內雷州府知府葉已於本年十月日丁憂去訖二臣之衰老廢敗亦有年矣一則以去任踰年而始劾之一則以去任踰月而猶劾之無乃以見任者情勢難言假以去任者朦朧塞責茍且欺罔莫此為大舉刺本以激揚今反以長惡遂姦何可望其廉貪而貞淫耶觀所劾則知所舉多狥情不可以盡信觀舉劾一事則知經略他務多虛應不可以為賴叨竊大位大祿大權而茍且欺罔如此臣竊為朝廷不平焉臣據事論事知其無以人事君之忠其諸風聞之言不敢一槩妄瀆聖聽伏惟陛下軫念民瘼不遺遐方勑下吏部都察院參論其素行議擬去留上請宸斷或嚴示戒罰以責晚效仍令該部通行各處撫按以後舉刺不許狥情市恩茍且欺罔有負任使庶官針有嚴法守不隳而風紀振揚非小補也臣待罪言責義不敢默惟聖明𢎞納嘉靖二十一年十二月日題吏科給事中臣周怡謹題為竭􅅹血忱懇祈天鑒非常變異詔求直言通行中外痛加修省以答天心罔極仁愛事臣愚竊謂穹然上覆者天也隤然下載者地也巍然首出綜天地而立極者帝也天地奠位者常也如日月星辰風雷雲霧海嶽泉石人物之類一失其常則皆謂之變也人君之位曰天位祿曰天祿事曰天工語曰天言禮曰天秩典曰天叙命德曰天命討罪曰天討以昭人君即天也不言地者統天之尊也天地之常人君之常也天地之變人君即引以自咎通行警戒大小臣工各勵修省期以復於常也近照欽天監奏稱嘉靖二十二年正月初一日日食不及三分且日未出時候即同不食免行救護奉聖㫖是欽此欽遵臣愚竊謂懸象著明莫大乎日月日月之食天變之大者也雖曰少食即同不食臣則以為與其少虧不如無虧救護可免修省不可無也正月之朔乃嵗之首也月之首也日之首也其食在日未出時則又時之首也是可不謂之大變耶臣愚竊窺天象有符聖功聖人慎獨之功戒慎不覩恐懼不聞蓋在幽暗隱微之中人所不知而已所獨知之地戰兢惕厲夙夜憂勤此聖人所以能立無過之地也故曰君子之不可及者其唯人之所不見乎日之未出方食而旋復即不見是圖不逺之復之象也伏覩皇上臨御以來敬天勤民昕夕無間聖德格天切憂勤之心致中和之極宜天地位而萬物育無少變異然古人以天變不作為天意忘棄以天變之見為天心仁愛是則天變實所以資聖功也且承君之命而致之民者臣也夙夜匪懈以事一人臣之職也臣職不修則化理自虧天象之變必不虛生近照禮部類奏災異奉聖㫖是上天仁愛災異疊見以示警告事關朕躬的知道了便通行各該衙門官員痛加修省盡心職業共圖治理以回天意欽此欽遵臣有以仰見聖心懇切不自滿足誠堯舜其猶病諸文王望道未見之心也視彼遇災而懼側身修行者大不侔矣夫既通行修省臣似不必贅也而復喋喋者竊以憂勤惕厲而無間者聖心也安常襲故者臣下之積痼也類奏災異乃禮部每年嵗終之常例也其不以常行文移了未完故事之心視之者鮮矣更望皇上俯念元旦日食非常之異特發明詔求直言通行中外各該衙門官員痛加修省共圖維新之治夫直言者盛世事也故曰主聖則臣直禹之告舜則曰無若丹朱傲慢遊是好傲虐是作罔晝夜額額罔水行舟朋淫於家用殄厥世姬旦之告成王則曰無若殷王受之迷亂􅒬於酒德哉夫聖莫過於大舜其不為丹朱曾謂禹猶不知耶成王嗣周之初其不宜指以亡國之主曾謂姬旦有不知耶而二臣直言如是此見虞周君臣和氣洽於上下略無猜嫌所以更相飭戒用成迓衡之治所謂泰和元氣在唐虞成周宇宙間誠為知言後世忠臣務為諷諫意非不美苐言辭微婉未免蔽晦本意莫若直言直指尤為光明何事為今日大難而最當先務者何事為今日大費而最當先罷者何人為大賢而為今日當先舉者何人為大蠧而為今日當先退者何事為今日最所忌諱而難言何事為今日最為緊要而難行者何刑為枉而當正者何賞為濫而當節者凡有關於時政務要知無不言言無不盡明白直陳毋晦正意萬一所陳有可裨補聖德者不妨已精而益求其精巳盛而益求其盛將見行之天下而臣民稱聖傳之後世而史冊生輝各該衙門官員將奉德意將見賢者益自砥礪而勇於為善中才益自振作而求入於善不賢者亦知所畏憚而改行以從善矣陛下和德於上自宰相以至百執事和政於下百姓泰和於天下天地呈祥神人胥慶實我明萬萬世無疆之福皇上萬萬嵗無疆之夀宗社幸甚天下幸甚微臣一念忠赤冒昧進言伏蒙天鑒雖萬死亦無辭也謹題嘉靖二十一年十二月日題吏科給事中臣周怡謹題為懇乞聖斷俯從人心亟罷不職大臣以重禦戎根本事臣竊惟連嵗邊疆大肆冦逼更畨迭入殘困山西震驚畿甸自古邊陲之患於今為甚人皆知籌邊失䇿由撫總之臣不職以致敵人輕忽突來突去肆無忌憚不知邊臣不職實由根本之地大臣不職之所致不於根本之圖而惟枝葉是務未見其善也夫禦戎之要莫急於兵馬錢糧根本之地莫重於户兵二部兵食不足雖有良巡撫名總兵亦無所用其智勇户兵不得其人而欲足食足兵必不可得也臣觀户部尚書李如圭之理錢糧是果有經國之謀者乎今當邊圉多事主客官兵所急需者惟在糧草一有不繼則難以號令而䇿勵之各鎮撫臣每有題請荷蒙皇上俞允下之戶部議處如圭昏然醉夢漫不經心該部司官各以職掌呈議方且悻目視之叱言邊鎮之事自有邊鎮之臣當處何預戶部動為題覆夫尋常無事之時尚當悉心竭力變通調度以求生財裕國之道今乃於要急之日蔑視國事罔修職業闒茸無為誤事不忠如此將焉用之今山西地方屢遭邊冦上厪聖心軫念生靈去嵗蠲免稅糧二年今又蠲免二年又發內帑之銀專命大臣賑濟其憂深慮切真痌瘝乃身之心也如圭曾亦思所以仰承德意下恤邊方上不病國下不病民而有變通調度之方否耶臣又訪得河南周府往嵗奏增祿米價銀此時戶部尚書李如圭貪受賄賂不思大計不行勘查徑自覆題每石加銀一錢該加銀二萬肆千餘兩原價每石折色叄錢伍分遵行巳久尚且嵗有積缺無能追納河南巡撫都御史魏因地方時勢之難又經題奏户部宜圖上下經久之計大為處置如圭竟不為之一處臣見舊逋愈加積缺新增徒有虛數而巳臣聞周府聞撫臣有奏令人齎銀一萬餘兩賂送李如圭等乃為覆題仍准加銀一錢周府分𣲖祿米每石扣支銀伍分該銀一萬二千餘兩以補前費遂致宗室閧然不平訐呈巡撫等衙門至今追銀問罪未結夫王府係天潢一𣲖帝室懿親其應得祿米自有定數應增應减自有法例其屈伸盈縮與時消息是亦該部之責也如其當增則亦當查前此何為而不增及今時可增與否明白議處請自上裁豈可貪受賄賂以私賣耶如不當增則枉法受賂尤大不可於王室至親尚敢奸貪不法而况於其他耶夫以大臣而志在貪利則於國事宜其昏然而莫之理也河南見鞠其獄明證指驗人人得而知之况河南連嵗災傷河南邊防之費困不可支今又嵗增銀二萬肆千餘兩巡撫知其難而處之户部獨忍不為之一處耶况今日大工之建邊防之費日新月盛朝廷之帑藏已虛百姓之膏脂亦竭雖各宗室賢王亦知上體國憂皆有孝敬之心各獻金銀以助朝廷之萬一寧肯於祿米定價更欲求加以重困朝廷耶如圭職掌司農罔思國計徒負癰腫之軀四維不知無異土木之偶一籌莫展乃反徇私貪賂負朝廷之恩壞國家之政王府不霑實惠百姓日見流亡尚何望其生財足用以給邊防之需耶如圭不罷欲求錢糧之有調度充足决不可得也其兵部尚書張瓚之司兵馬是果有折衝之才者乎屢經言官論劾不知求退每荷皇上姑留罔知報效凡一都督總兵副參遊備之升補無非平時賄賂之私人其賄賂者豈皆盡取諸私囊無非借貸於巨室一得升補即遂刻剝軍士以償債肥家如此用人安望其有奮不顧生舍命敵愾者乎今雖痛念邊毒重惟主憂不受一賂而用智勇之將其為用者亦確信素日之心術而深疑今日之舉用以為危急之日雖舉用不計而饋賂之乏終任用不堅後之繼今者亦猶今之繼昔也今日何賴於瓚而尚可任用之耶以為福將耶則今日折衝非才明矣以為罷瓚則無能代者自古無借才之憂堂堂天下豈以無人為患耶往者陜西奏徼幸之功本兵先䝉殊賞廕子錦衣該司郎中王即升應天府府丞今日山西屢至失事巡撫總兵置之重罪則本兵亦當先受顯戮其仍有當連及者亦宜詳議可否豈有成則先論其賞敗獨不可分受其罰即近日敵冦山西搶掠二十七州縣孶畜一空子女盡去殺傷之慘尤不忍聞兵部近議用夜不收三十名在京常川往來爪探消息緩急以為之備巡撫山西都御史劉乃厚賞之該部復厚勞之令其勿言山西之慘止言邊冦巳困殺馬而食職方司郎中楊公然揚言士夫慶敵之困以懈衆心以罔朝廷瓚等職掌本兵九法罔建乃互為欺蔽上負聖眷而不顧甘心貪昧下犯人言而不恤尚何望其折衝萬里以制邊冦之橫耶張瓚不罷欲求智勇忠義之將决不可得也是二人者不宜一日居乎其位者也其提督十二團營兵部尚書劉天和年垂衰暮日薄桑榆步履艱難足欲前而屢却氣血衰憊志欲鋭而莫遂昨觀各城門揚兵之議有同兒戲此可觀謀矣團營之兵挑選精鋭內以為王室干城之重衛外以備四方不虞之援救必須精敏奮厲之臣以提督之則可以作六軍之生氣以備萬里之長城今天和果方叔元老而克壯其猷者乎竊謂其自知必不能也重兵要務之地非養老圖安之所若用此衰憊以當重任必誤國家之大事但天和壯嵗自立素負重望今及衰年精神䇿勵自不能前合無容令致仕以全晚節别簡才智勵精之臣以充其位則於國體軍務兩得之矣朝廷命廷臣集議更置撫臣博求將材又命勳臣傳諭户兵其所以籌邊經國必期兵食之足將帥之良計出萬全戰可百克大宣威於沙漠以盡滅邊冦解邊民倒懸之望快中外雲霓之心以致聖心焦勞慮傷心血主憂臣辱分義不容巳者一時大小臣工罔不思忘生徇國奮勇敵愾以紓皇上西顧之憂而重要之地尚使匪人充之則無以新天下之耳目鼓中外之勇志是亦尋常虗應故事而已未見其實修內攘外為匡國滅冦之圗也伏望皇上軫念邊陲重圖根本大施威斷慎簡重臣或令自陳或令致仕早賜罷黜速易賢才以圖億萬年長久之計以振今日中興之治實宗社無疆之福邊方再造之願也臣待罪言職深悉時艱但知一得為國之忠不顧衆怒殺身之禍惟聖明留神裁察則宗社幸甚天下幸甚臣冒昧進言無任殞越之至嘉靖二十二年二月日題吏科給事中臣周怡謹題為紏正撫臣濫舉失體事竊惟治理之要莫先於用人勸懲之機莫要於揚激伏覩勑諭巡按御史必曰勸懲得體人自敬服欽此朝廷之豫奪部院之考察皆據撫按舉劾之疏舉劾之典誠鼓舞人才轉移治亂關係匪輕不可不慎也是故舉劾當則剛正廉明者定而貪暴卑諂者逺舉劾濫則剛正廉明者耻而貪暴卑諂者肆矣部院據監司之舉劾考庶官之賢否而監司之賢否亦於此焉辨史曰達視其所舉是巳何也水流濕火就燥各以類從也近閲巡撫湖廣右副都御史陸杰厯論官屬賢否境內人才各疏其所論薦果協公論與否臣不能悉知但平居論人咸謂才難今觀本官所舉未免雜濫太甚即今日之方面既有舉而無劾則來年之考察宜有陟而無黜也照磨縣丞非謂無賢竊謂天地似廣未必若是多賢爾其一疏薦大冶縣主簿郭則曰縣知有丞而不聞有令其一疏薦大冶縣知縣張朝錫則曰端謹自持而民隱恤剛柔相濟而邑政修夫既不聞有令張朝錫又何為而薦耶兩疏並舉自為矛盾其薦境內三人而廖道南與焉夫道南何如人也人品鄙劣心行汙穢貪淫邪媚里閈所賤惡縉紳所不齒者即有華藻靡詞不過雕蟲小技非有本之學理到之言居可訓俗出可華國者也巳燼之灰夢想再燃既腐之木妄覩復發在道南蓋晝夜未忘寢食在念也苦恨無階可進漫自獻頌希圖使其在位猶當力詆屏斥以清仕班今既考察不謹奉有明㫖閒住是舉朝公論衆以為不可而退者非若偶遭譴謫或一二人之論劾者可同日語也杰或不知而舉之不明也知而舉之不忠也不明不忠將焉用之杰之大槩昭然於所舉見之矣臣又見近日各處巡撫舉薦太濫大抵資秩巳崇類皆援結自固甚者因而為利又其下也况嘉靖二十三年正月該考察天下來朝官員賢否雖曰黜幽陟明而黜尤最重若不嚴行申明未免承訛襲舛虛應故事賢不肖無所勸懲而治理荒矣伏乞陛下軫念生靈圖惟治理降勑切責陸杰引用匪人大虧忠藎薄示懲罰仍勑吏部查照該部近題准事理申諭各處撫按悉心博訪務要甄别賢否無惑人言無持兩可無徇鄉故無偏愛憎無恱諂佞而醜正直無庇權要而踈孤寒除撫按接任未及三月者不必舉劾外其餘無分逺近俱限二十二年十一月以裏各具所屬賢否實跡奏聞其例不舉劾者明開揭帖定注的確考語另送部院查考來年考察衆以為可黜者查撫按之疏却在舉列則撫按連坐為妄舉者戒庶舉劾精嚴勸懲得體賢者日興不賢者日逺而治化彰矣其境內人才務要察其才德果係天下之望去位非有不湔之罪方許論薦其鄉評素短善狀不聞不許徇私妄舉以為他日起用之地其有違例舉者罪深作俑惡同圮族聽部院考察科道論劾則公是定而士風端其於治化豈曰小補之哉臣待罪該科義不容默惟聖明𢎞納庶官幸甚天下幸甚臣冒昧狂瀆無任戰栗隕越之至緣係紏正撫臣濫舉失體事理未敢擅便謹題請㫖嘉靖二十二年四月初五日題吏科給事中臣周怡謹題為姦憸輔臣欺罔專恣懇乞聖明早辨嚴絶以防微杜漸事嘉靖二十一年八月十五日伏蒙陛下勑令禮部尚書嚴嵩入閣辨事維時臣等即論重位不宜任以匪人既而言論紛集未䝉採納而於嵩也任之益篤遇之益隆夫豈真以嵩為賢而任之勿二耶抑豈以臣等之言真為未是而不用耶蓋以嵩之奔走於陛下左右亦有年矣其心術之奸回行檢之汙穢人品之鄙劣識見之淺陋亦巳照之悉矣第以目前奔走承順頗可驅役一時未有當意者姑令承乏亦因以試之庶幾感深圖報因言知耻飭躬勵行改惡自新嵩未必無人心者嵩因人言自陳之疏云臣之頌寃真若沉於苦海又云人泥往事為嵩計者宜蚤夜以思上感聖明簡任殊遇於衆怒羣猜之日下耻人言顯詆為譏以崇凶極醜之名痛省往愆翻圖新美庶幾上可以仰答聖明之萬一下可以少息人言之責望不宜積迷不悟就下不返長負國恩反讐公是卒自歸於盧杞裴延齡同流近於嘉靖二十二年二月內又䝉陛下賜嵩以忠勤敏達銀記殊錫異數日新嵗盛嵩自揣分遭際竒逢即殺身以報猶為恆情古云士為知巳者死况一身復荷聖明之陶鑄耶陛下錫以忠勤敏達四字豈謂嵩果能稱此耶夫亦金錢愧心之意將使嵩思果忠矣勤矣敏與達矣抑未能如聖諭之責望耶反觀內省夙興夜寐勉求四字上以增聖明用人之光下以稱輔臣弼君之任聖意淵深或在於此嵩自翟鑾卧病未出之後幸可以專柄攬權之時凡近日陛下於在廷諸臣小懲大戒無非激勵羣䇿共圖治理中外警惕罔不戒省此即日月之明雷霆之威人所共見共聞者也為輔臣者即有票擬調㫖之役亦不過贊理化育而從違可否出自朝廷孰敢竊以為威福耶書曰惟辟作威惟辟作福臣無敢作威無敢作福臣而有作威作福者必害於而家凶於而國典刑具在孰敢不欽嵩乃揚揚自竊為威福遂使待罪承恩者車馬駢集於私門少不順附者即有播弄近如王堯封其為人不齒於士論鄉評人人知之嵩等不知何故乃欲援引却揑稱陛下之意欲用之親約吏部尚書許讚到東閣傳示聖意比該部猶以未見的實且未推舉及奉明㫖再推兩員來看欽此然後以王堯封推上果蒙欽㸃一時大小諸臣驚愕無措以為聖嚮方切姑各忍而未言果能不負則亦巳矣如其誤事言之未晚也兹南京科道等官張汝棟等各具疏論劾即奉明㫖王堯封著照前㫖不許推用這員缺另推兩員來看欽此綸音煥赫宸翰輝煌中外諸臣豁然痛快至明至斷乃聖乃神堯舜其猶病諸不意聖明之世嵩等乃敢欺罔一至於此耶即陛下有欲用王堯封之意嵩等尤當力論其未可堅執以為不敢奉詔不宜依阿曲從致皇上有後悔也如非聖意則嵩等欺罔之罪律例昭然嵩又嘗對人言即今翟鑾病久不出嘗以是面奏陛下房杜謀斷相資臣以一身兼之為難陛下稱以古昔周公亦只一人此言有無不可知誠如聖諭則嵩當毛竦汗流愧悚不暇佩服聖訓永言師法可也尚可揚揚誇詡於人以自侈大耶周公之相成王其事具在方䇿嵩盍取以為則輔相之職莫大於進賢退不肖勸善懲惡為朝廷樹風教貽典則也今多事時正求賢擇才為急海內英豪不為乏人見任去任寧無數人可用者嵩可諉於不知耶知則宜時聞於上出格推用為時解紓未聞其推一賢舉一能是蔽賢也不知則宜汲汲求之不宜泄泄沓沓美食安坐行呼唱於內庭外衢而巳耶如樊繼祖附勢媚竈蠅營狗趨惡跡穢狀真有罄南山之竹不足以盡書者姑舉其兩端言如築城與先任霸州兵備副使王鳯靈上下通同燒磚冒破得銀巨萬不數月而冒破無存喪師僨軍仍以為利此誠盛世之賊臣不容於死臣尚追恨夏言相為依附未究罪狀若使老死牖下猶為大刑之逸近以傳奉起為工部尚書兼都察院都御史湖廣大木督木雖今日至急之務在廷在外未為無人何必於罪人樊繼祖耶嵩宜極力為陛下陳之何未聞其出一言耶大臣歿後贈官贈諡朝廷勸善懲惡大典也見尊賢賤不肖雖身後不少假也凡大臣厯任雖久曽經論劾不許濫請巳故兵部尚書張瓚在任善狀無一劾疏無啻數十上負國恩下遺邊患明刑幸逸於生前顯褫宜行於歿後顧乃恩典備隆贈諡兼極近該禮部又題巳故致仕原任南京兵部侍郎吕柟云云未究厥施方且宜隆恩典用慰賢魂兹奉明㫖吕柟諡罷夫褫張瓚之官可以懲惡增吕柟之秩可以勸善恩禮所加風化所關凡此皆嵩當極言力論於陛下務使進退不致乖人望勸懲有以維世教嵩皆無一言及此則將焉用彼相哉陛下聖明天縱剛斷雷轟照羣慝於隱微發大憝於將漸往昔任張孚敬則用夏言以防之任夏言則用霍韜以防之方其才猷略效也則確然任之而不二及其惡跡漸張則斷然去之而無疑此陛下之神機化權默運超駕百王者也傳曰人臣無將將則必誅易曰履霜堅氷至言辨不可不早辨也今遇聖明在上嵩豈敢有他哉顧其惡德日崇非心不悛聖眷益隆而怙終益甚人言殊劇而遂非殊熾原闕吏科給事中臣周怡謹題為懇乞聖斷俯從言官亟出匪人以崇治體事臣待罪吏科近接到一夲為大臣貪汚素著恐不能仰答聖心以副倚任乞賜黜罷别簡賢才以慎固留都事該南京兵科等科給事中張汝棟等論劾南京參贊機務兵部尚書王堯封等因奉聖㫖王堯封著照前㫖再不許推用這員缺便會推兩員來看吏部知道欽此又接到一夲為慎用人以崇治體事該吏部題覆巡按貴州監察御史趙闕論劾輔臣翟鑾引用王堯封費宷等因奉聖㫖是各該論薦官員你部裏嚴加掄簡遇缺從公定擬聽候㸃用若所薦所用不宜的著兩京科道官即時舉劾欽此又接到一本為大臣庸鄙不堪任使懇乞聖斷速賜罷黜以重朝寧以清仕途事該吏部題覆工科給事中李綸論劾工部尚書甘為霖樊繼祖有干清議等因奉聖㫖甘為霖巳有㫖了樊繼祖奉命督催大木且留用欽此又接到一夲為懇乞天恩俯賜罷斥以息人言事該工部尚書甘為霖奏奉聖㫖恭舉廟建在即卿宜即出供職以副委任不准所辭吏部知道欽此臣於各疏反覆諷誦慨嘆不能自巳此見陛下總攬乾綱赫啓離照因言官之論或允而徑去之或下之該部因該部之執或允而申命之或示以微權批答渾然昭示懲戒使留之知愧任之為辱真天語𤣥機聖神衡鑒在廷臣工莫不愓然警省肅然畏服臣愚遭逢良會竊懷一得敢不敬陳甘自負於聖明之世耶伏思陛下於言官之言貴能聽尤貴能用聽而不用猶不聽也於羣臣之佞貴能知尤貴能逺知而不逺猶不知也王堯封幸賴聖明巳斷然去之無疑大快人心其樊繼祖奸佞詭祕情罪深重比之堯封不止於去而巳耶臣請厯數其詭祕欺罔之大罪有五往年奉命督築鞏華城通同霸州兵備副使今升廣西參政王鳯靈冒破磚價各得銀巨萬八郡之民恨不食二臣之肉此其詭祕欺罔之大罪一也及邊𤇺緊急廷推總制抗沮不往繼祖被論劾却又飾詞請往以掩前罪實非誠心直道此其詭祕欺罔之大罪二也荷蒙特宥仍命領其事宜誓以馬革裹尸必期滅冦自贖顧乃嬰城自避不見一敵不發一矢石門兒縱殺降人二百餘人詐稱首級妄奏捷音此其詭祕欺罔之大罪三也又奏帶帑銀百萬自宜敷宣德意使兩鎮之兵人沾實惠乃指稱客兵支費不三四月而冒破遂盡及原任刑科給事中龍遂劾其老師費財繼祖奏辨內以九十萬原數計之尚未支使十分之一何謂費財又嘗奏曰糴買糧草升束未動及新總督翟鵬交代之日則已奏宣大倉場在在空虛掊尅侵漁無而為有此其詭祕欺罔之大罪四也諂媚紀功科道欲求彌縫其迹事既不諧又諂事近侍為之內主卒得朦朧罷任聽勘幸免其罪併其勘復朦朧中止人至今恨之未已誠所謂百足之蟲至死不仆此其詭祕欺罔之大罪五也又嘗觀兵部題覆大同巡撫龍大有查處軍儲馬匹銀兩緣由奉明㫖顯是樊繼祖前後所奏詞涉虗誣不曽著實幹事是繼祖欺罔素著聖明久巳洞照負陛下重託壞國家大事者斯人也惡同胡守中而詭祕欺罔過之使臠繼祖之肉於畿甸則八郡之民可以忘勞而不怨梟繼祖之首於宣大則兩鎮之兵可以忘死而勇於戰矣夫興大役動大衆傾大帑不能為國家出一毫末之力而又因以為利是可忍也孰不可忍陛下必欲役民却敵則於繼祖之罪不可以不究而尚可以復大任耶且近年邊方失事之臣史陳既罷斥於前龍大有劉臬王升白爵李蓁張達等又皆拏解來京見今聽問而罪魁繼祖聽勘未結又復大任之則法亦不足以服人為繼祖者亦懼明神共殛將魂奪魄褫必不能安然以赴命也國君進賢如不得巳左右諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之今繼祖罪惡國人諸大夫皆以為不可不究而陛下起用之臣竊以為若出左右之譽請陛下顧左右譽之者為何如人若出陛下之特知臣不敢不謂非堯舜之一誤也陛下如以臣言謬妄請試之遍詢廷臣更請廣布緝事人員厯訪逺近如有一言譽其功而辨其枉者臣請即日伏欺罔之罪萬死不敢辭也至如甘為霖庸鄙自居無他行能止以工作躐躋八座宜思遭際非常勉圖報效夫何驕恣無忌貪得無厭每幸大工為竒貨據恩典為巨肆今朝廷內有不得巳之大工邊有不得巳之大兵公私匱竭賣官鬻爵巳無不至為霖顧不知耶如給事中李綸所奏則為霖尚為有人心乎欺君誤國市恩分利鄙夫如此而久居重位六卿羞與為列賢者踈而逺之誠不可一日復玷清班也伏讀綸音恭舉廟建在即卿宜即出供職以副委任蓋以大事在即使同文思院頭目董之而巳彼昏不知省幸不失富貴足矣又安能感聖言而知愧耶鄙夫愧辱固無足惜但大臣者國之表也大臣虧體辱朝廷亦甚矣伏乞聖明秉心不二去邪勿疑樊繼祖仍令回籍聽勘嚴責原行勘官作速秉公勘查錢糧有無侵欺首級有無詐冒奏請定奪勘官若再稽誤掩匿坐以黨惡一併查究甘為霖聽令自陳致仕速令吏部别推在廷公清忠敏人臣數員疏請簡用以代其任則虞垂作工寢成孔安非徒集事而大臣體貌亦自隆重矣重大臣者所以尊朝廷也王鳯靈付之吏部以備考察淑慝旌别懲勸分明則賢者勵不肖者逺為朝廷集大事驅大懟不患無人也如繼祖輩不復究治屏斥彼必曰我欺罔敗露如彼而上不之責矣言事者疏我之罪如此而上不之聽矣則必愈肆欺罔公為不善而更無忌憚矣姦邪得志羣臣效尤非國之福也臣職在諫諍志無回隱但知為朝廷舉大欺蔽守大法持大體非為私言惟聖明試審思之臣無任激切忠懇之至嘉靖二十二年五月初七日題吏科給事中臣周怡謹題為懇乞慎簡秩卿以表式官僚以敬交神明事近見刑部問過犯人陳違法姦盜極備諸醜大穢清規皆由先任太常寺卿掌寺事禮部左侍即金主張縱容且為媒求納賄脫罪巳奉欽依陳發邊衛永逺充軍金不必提問也著為民欽此臣愚竊惟太常之職專一以敬事神祗協和上下即虞典夷䕫之任周禮宗伯之屬關係實匪輕也若得一齊明貞靜之人任之則所以表正官僚慎重祀典籩豆靜嘉八音克諧將見百神胥恱萬福來同隂陽調而雨𤾉時民人樂而品物育鳯儀獸舞禎集瑞叢泰階平而王道盡矣天下太平其機未必不在於此詩曰維此文王小心翼翼昭事上帝聿懷多福又曰肅肅在廟又曰於穆清廟肅雍顯相濟濟多士秉文之德對越在天駿奔走在廟此見文王事天祀祖盡其誠敬而顯相多士皆秉文王之德恭惟我皇上敬天尊祖精一無二仁孝誠敬於文有光其承事駿奔決不可以匪人參之今太常之卿即顯相也其承郎樂舞即多士也伏思皇上夙夜在公恭默思道其欲慎簡此輩蓋恆軫宸慮未間也乞敕吏部慎選其人以帥其僚屬或詞林耆宿或卿佐名賢無分在位在家務求道德純潔文學淵閎者俾充其任則精白誠䖍靜共厥位上可以仰充皇上之顯相幽可以協贊神明之孚格其諸僚屬多士表式有儀齊明成風天人之際感通之妙真有不可以言語粗述者芻蕘末見千慮微忱倘蒙聖明採納神人幸甚天下幸甚臣愚不勝懇切惶悚之至緣係慎簡秩卿以表式官僚以敬交神明事理謹題請㫖嘉靖二十二年五月日題聖㫖該衙門知道欽此吏科給事中臣周怡謹題為懇乞天語嚴諭中外諸臣以重新命以責安攘實效事臣伏見皇上以連嵗邊患殘破山西門庭之冦堂奧之憂昕夕不寧慮傷心血其欲修內攘外無時刻不在念也頃因言官或歸咎邊臣撫總不得其人或歸咎大臣户兵不得其人荷蒙陛下納諫如轉圜悉俞其言亟令所司集議必求其可代者赫然英斷中外一新一時大小臣工肅然警惕罔不內省曰大聖人之作為真如風雷之迅蟄無不啓立無不偃者矣又嘗閲輔臣嚴嵩感激聖諭而陳言邊務一疏內有曰方今內外諸臣每遇敵一冦邊則皆驚惶以為患在不測冦退則遂泰然以為無事不復關心明年夏秋之交戎馬將至又復驚惶日復一日嵗復一嵗更無驅攘之䇿斯言深中時弊一時大小臣工惕然驚省人罔不自喜曰有宰相憂國如此何患內治不修外患不息也耶又見秋冬以來半年之間內自宰相以及九卿之長外自巡撫總兵以及兵備之員盡更其人一時大小臣工翻然改觀又罔不自慶曰用人如此又何患事功不成而太平之治不可見耶夫以天朝之大禦彼邊冦之微似不假餘力而摧枯拉朽之無難也然非君相聚精會神注意於彼則中外人心窺竊其意向輕重而為敏怠亦孰肯奮發而勇作也今也君憂於上相憂於下中外羣臣上體君相之憂下恤邊民之困榮感新命大奮忠勇精神氣㷔必能不假聲色自足折衝萬里之外何彼蠢爾小冦有不膽落心寒而奔竄者乎臣愚私憂過計猶以為易作而難久者意氣也難得而易失者幾也易去而難得者時也皇上軫慮亦以邊報之日殷相臣懷憂亦感綸音之懇切是皆意氣所發臣竊計相臣今日之憂不識視前日之言何如也是則微臣之所憂也外而各邊巡撫總兵一時盡易而新之內而戶兵二部尚書俱易而新之乘時搆會各礪乃志各淬乃力司農則思所以區畫平時何以使糧餉之日足有事何以備賞賚之不乏司馬則思所以區畫何以運籌帷幄何以折衝萬里巡撫則思所以區畫地方之責何以塞之意外之變何以圖之總兵則思所以區畫何以使我兵有勇而知方何以使外冦畏威而逺遁精神鼓舞政令嚴明罔不在厥初此則幾之所不可失者微臣之所憂也往時料敵者則曰秋髙馬肥敵志乃南今一二年來入夏即張皇矣以今計來嵗之事只在春三月之間爾日月易邁如駒過隙年復一年坐馳嵗月每至臨事徒切噬臍之悔亦何益哉茍有上體君心下恤邊禍者必卧薪嘗膽愛日以圖中夜不寢以謀安攘矣寧肯泄泄優遊乃效燕雀處堂尚幸突决棟焚之未及也此則時之所不可失者微臣之所憂也傳曰君命召在官不俟車在外不俟屨今戶部尚書王杲尚未見其赴任是何濡滯也兵部尚書毛伯溫素隆時望極荷帝簡邇者蒞任革弊一疏未愜衆心將官賄賂之行全視本兵部好尚何如昔楊綰以清名儉德拜相之日郭子儀方宴客即減坐中聲樂京兆黎幹即減騶從中丞崔寬亟毁撤第舍誠使門庭貞肅則賄賂滅影不令而自畏也假令素志餮叨則錢神蠅集雖禁亦不從也故曰其所令反其所好而民不從弊非當不革也此亦新政常行文移即張瓚昔年未必無此舉也所望於伯溫非常謀猷當不在此而李蓁張達之議復尤駭衆見使伯溫選將而惟二罪之惜則年來禦冦氣勢亦巳兆見於今日矣李蓁張達而非罪也則此時宜內論不宜輕拏前輕易而拏解今輕易而放縱非惟觀者竊笑臣謂李蓁張逹亦必心笑之矣况二罪之才非可孟明韓信之比又何必戀戀於彼以重傷國體也荷蒙聖明英斷仍以二罪付之法司員缺另行推補中外人心始帖然畏服軍法嚴重非同兒戲矣伯溫時望所歸而臣言如是所以責備賢者不自知其言之過也各邊撫總之臣今易巳數月矣未見建明大議振舉大䇿臣竊恐諸臣新易不大懲創振作是大為新命之辱微臣之所憂也伏望皇上痛懲往事大舉新圖赫然斯怒嚴諭諸臣務令各勤乃職各竭乃才內則居中制外外則捍外衛內中外同心將相協力上以仰副皇上之新命下以俯答天下之風望近以安邊圻之軍民逺以威沙漠之小醜無襲覆轍無騁虛談無失良幾無玩良時果能建功著效朝廷當不吝爵賞如其玩時致冦許臣等科道官指名參究必置重刑曽謂以天下全力精簡時才竟為區區邊冦所奔走臣竊耻之仍乞嚴促王杲上緊到任糧餉一節尤為緊要屯田鹽法所當悉究冗員冗兵所當裁革近見有欲議加賦者此萬萬不可即今四方水旱無處無之戶部差官催徴纍年積逋則可見常賦有不解納者矣而尚可加耶與其加賦莫若節用與其加賦於民莫若減俸於官不泥常格必有權宜漆室之女尚知憂葵微臣待罪言官私憂過計惟恐有不及者而敢謂其言之過耶惟聖明留神則一怒而作中外之志一怒而安天下之民宗社幸甚天下幸甚臣冒進狂言不勝激切恐懼之至嘉靖二十二年五月日題吏科給事中臣周怡謹題為慎選久任遵明㫖惜賢才以禆治理事我國家因時立制則周建官六曹分職序賢程能非以遂私維以贊化吏部為六曹之長百辟之刑也職掌最重銓考尤要蓋以進賢退不肖其責大也得其人則俊乂登庸憸邪逺屏治化之不暢也鮮矣匪其人則奔競盛行諛諂得志治化之不蠧也亦鮮矣此文選考功為最重而當慎選之選得其人又當珍其材而久任之任之久自當殊其秩而超擢之以昭勸也臣伏覩綸音今後文選司郎中著久任云云欽此文選久任則諸司在其中矣此可仰見皇上序賢惜才之遐意也近觀吏部卿亞並賢屬僚咸勵翼翼將事明明布列上下帥承師師協濟誠可謂慎選矣臣獨懼久任之未講爾竊見自奉明㫖以來文選郎中林春以病卒於官繼春者考功司郎中髙耀也僅及五選未周一年已升太僕寺少卿繼耀者稽勳司郎中王與齡也耀之賢不及與齡升之驟任之未久人固不甚惜也今與齡調任以來精白一心尚賢掄才見任者序其勞資閒廢者拔其德望無幸進無淹任又照得考功司郎中鄭曉持心公平核實精當題覆敏速夤緣杜絶明足以行其公果足以成其敏近雖意見不同要非私蔽為害是二臣者中外孚協物議攸同不易其志均可謂賢也已臣獨懼其照常序遷則於二臣任不盡其才事不終其志而後來繼任者雖才志不異而諳練終殊况嘉靖二十三年適當朝覲考察之期考功郎中尤為緊要於此遽易其人深為未便今後吏部主事有缺須九卿之長會舉其司屬之賢者充之務要行履端莊學問粹美器度𢎞達無徒取其科第之崇門徑之捷但有囑託即非賢士他日考察即以坐之是亦備慎選之一節也臣愚伏乞勑該部遵奉明㫖文選郎中務要久任不許一年輒用推升仍乞限以三年為凖今後再有違㫖不及期而升者許科道官參紏考功郎中每當內外考察近期一年之內不許推遷以遂推避庶賢才彚征不肖者不得以幸進貪昧速黜鑽求者不得以遂私官稱政良化行俗美太平治理可計日而待也臣待罪該科義不宜默於聖明之朝無任真切願望之至緣係為慎選久任遵明㫖惜賢才以禆治理事未敢擅便謹題請㫖嘉靖二十二年五月日題吏科給事中臣周怡謹題為內外大臣不和乞賜天語嚴責以敦國體共濟時艱事臣惟人臣事君無分崇卑無分內外皆以盡心體國為忠協力濟事為和舍巳從人為虛忘讎序賢為公自古及今未有不由此而臻治理者也况卿輔大臣爭於朝撫總大臣爭於邊而求修內治禦外侮萬萬無是理也近知內閣大學士翟鑾嚴嵩與吏部尚書許讚不和互相詆訐及查兵部先因大同總兵周尚文奏討錢糧馬匹題覆疏內知巡撫總兵不相協和近據督理糧餉右侍郎趙廷瑞之疏又知總兵張鳯周尚文與總制侍郎翟鵬及督餉侍郎趙廷瑞俱各不和人持已見各自為心此大不祥之事誤國大禍目前立見臣請先論其理而後及其事易曰天地感而萬物化生聖人感人心而天下和平傳曰隂陽和而雨澤降其論兵則曰天時不如地利地利不如人和和之時義大矣天地隂陽不能違也近驗之一身尤見親切今夫心志寧靜則目之所視耳亦聽焉足之所至手亦從焉各從心所欲而效其職能然或目視而耳不聽則見聞不相符手持而足不行則物位阻而事廢其於心志所欲曷克由濟人君猶心志也內外羣臣猶耳目手足也人臣茍知尊奉心志寧肯耳目自相違手足自相賊耶故曰同寅協恭和衷哉風教之大禮讓為先禮讓之行朝廷大臣為首朝廷者萬方之所宗仰大臣者羣臣之所楷模觀而效焉必有甚者朝廷有違言之隙則讒譖之釁長於外大臣有動色之爭則攻鬪之禍流於下由今遡昔未之或易也皇上臨御以來二十二年於茲矣由初年求治之鋭以及今日憂民之切宜乎天地位而萬物育太平有象而四夷來王也今陛下日事禱祀而四方之水旱災傷未能消也嵗開納銀之例而府庫未能充也嵗頒蠲租之令而百姓未能蘇也時下選將練士之命而邊境未能寧也此其故何也良由陛下勞心焦慮於上而下未有肯將命之臣也今何時也以內則財貨匱甚而百役繁興以外則强敵驕甚而九邊虛耗為輔臣者宜如丙魏同心輔政房杜謀斷相資夙夜匪懈畏天命而悲人窮凡可以利國家惠小民安邊徼者無不精思詳畫上以啓君心下以勵羣工可也夫何大學士翟鑾嚴嵩慿籍寵靈崇已徇私播弄威福市恩修怨聞二輔臣在內閣有違言失色入見陛下各有私陳背詆是二臣已不和矣何望其同寅協恭和衷以事上而風下也輔臣以至九卿百執事位有崇卑均之為耳目手足聽命心志以共成一身者也宜相濟而不可以相賊也輔臣真知人之賢不肖宜明告吏部進之退之則人心攸服不宜挾勢徇私以不可服人者屬之進退吏部宜有真心真節如貞女烈士使人望之知畏雖權貴不敢以非義相干不宜依阿奉承一啓順端而後不可逆也今嚴嵩威靈氣㷔凌逼百司招權攬威使凡有陳乞疑畏罔不奔走其門先得其意而後敢聞於陛下中外之臣不畏陛下而惟知畏嵩也翟鑾則依阿委靡不能張主而氣勢之弱猶不足以驅人之趨附名位之先亦足以為嵩之妨礙尚書許瓚兩世三居吏部亦可謂世臣矣雖曰小心謹畏而直氣正色不能預銷權位要求之心弱亦甚矣凡此皆陛下之洞照知臣言之非誣也詩曰有來雍雍至止肅肅相維辟公天子穆穆此盛世之氣象也今卿輔大臣隂擠陽排互相詆訐以陛下為何如主當此之時不思培植元氣愛護人材共圖折衝禦侮之計而務修私怨果何心哉臣恐大臣不和則憸邪細人乘間抵隙互相黨比媒孽啓釁非國之福可懼之甚也往時論劾輔臣御史如謝瑜童漢臣相繼假公事而罪謫之去矣其伊敏生喻時等亦巳露於聲色直言敢諌之臣於權貴雖不利於朝廷則大有力也今皆假以公事奉有明命罪之謫之臣恐自是無言者矣陛下之臣雖有如檮杌歡兜誰復言之非國之福可懼之甚也今入秋宣大巳報聲息而文武總制大臣各立門户各持意見平時既藩籬扞格不相和協則必無長馭逺駕之䇿臨敵掣兵按伏對壘將見甲可乙否彼是此非正臣所謂目視而耳不聽手持而足不行其不誤事敗謀臣不敢信也初設總制總督大臣欲其權力足以制三軍之命如頥氣指使可無不如意也今乃以相抗各自為大而耻相下各自為是而耻相用是假之權位以相角而非為衛國禦冦謀也大敵在前而文武搆釁非國之福可懼之甚也臣又見總督兩廣兵部尚書兼右都御史蔡舉劾方靣守令官員內舉布按兩司而劾一都指揮僉事又以去任踰年踰月二知府劾以塞責舉文劾武茍且欺罔殊負朝廷簡命重臣撫綏遐方之心殊失鼓舞文武經略地方之術今當致力中原宣威沙漠之日於忠勇將官宜折節優禮下之結其死心庶可得死力也使韓淮隂無蕭相國國士之知終於遁去嶽武穆不有內制其禽烏珠强宋室當無難也今誠有韓嶽之將寧肯低眉俯首受制於文墨刀筆之吏耶務須推赤心置人腹中明大義激其烈志有所異同明白曉諭不宜輒為裁抑以挫辱之為將臣者亦宜乘時立功奮勇先登以作三軍之倡不宜妄自尊大自取悔辱由是而人和所結堅利於金湯又何患黠冦不成禽也臣又聞近日邊事內外掣肘文武諸臣誠喜於被論而退信如是則上負朝廷推轂之心下解三軍死綏之志庸懦不忠召敵人輕視之侮為國大辱誤事非小也臣愚無知伏乞陛下大明離照赫施乾斷無惑近論無忽逺圖戒輔臣毋務修怨以竊威福戒吏部毋務依阿以輕黜陟戒撫臣無辱將官以離士心戒將官無懷小忿以誤大事此皆目前緊要不可一日緩者也更望陛下優容言官博采羣䇿虛心聽納先務和德於上則大臣自爾公忠為國虛巳忘讎各務和讓於下羣臣肅雍百姓泰和人和薰蒸神之聽之終和且平區區外侮有不足攘矣此皆係於陛下建中和之極以先之臣微小無知竊見時事大傷國體私切憤鬱恨力不能排闥以號訴於扆前誠得天聽而見之施行則亦可以報陛下祿養洪恩萬分之一即日賜死所甘心也他日曖昧制於輔臣之手如謝瑜童漢臣輩陛下能知之乎臣愚無任戰栗隕越之至惟聖明覆照宗社幸甚天下幸甚緣係內外大臣不和乞賜天語嚴責以敦國體共濟時艱事理未敢擅便謹題請㫖嘉靖二十二年六月日題吏科給事中臣周怡謹奏為懇乞天恩認罪回話事先該臣題為內外大臣不和乞賜天語嚴責以敦國體共濟時艱事等因於嘉靖二十二年六月二十九日申時欽奉聖㫖周怡這厮所說諸臣不和負君致禍都是然本心初發只是訕謗曰朕日事禱祀不知先務和德於上人和薰蒸神之聽之夫朕事天禮神多荷洪庇至於四方之廣豈得都無水旱若論天下治安則你每凡為有位者果能秉公竭忠修和盡誠同心贊主何患不治安焉他每內外諸臣不和你每知道如何不即時指名劾奏至此日才說著從實輸情回將話來欽此臣聞命自天驚悚戰栗不知所措委的昏迷狂妄悖亂荷䝉聖恩洪大不即加以斧鉞且令臣從實輸情回話臣恭捧綸音委曲詳盡伏地叩首號泣仰嘆曰大哉真聖人之言也其容臣真天地之大也其知臣真日月之明也臣復何辭緣臣愚昧竊覩聖明孜孜求治敬天憂民昭格上下諸臣不能仰體各修私怨誠恐上負君父下誤時事心切慮之欲效犬馬之忠陳於陛下而臣之知識短淺辭不達意遂至狂妄悖亂上瀆天聽臣之罪也又不能早見預論臣之罪也伏乞聖慈𢎞擴覆載之仁大寬斧鉞之誅矜臣之志赦臣之愚臣恐懼昏迷不知所云不勝悚仄隕越之至為此具本親齎謹具奏聞伏候勑㫖嘉靖二十二年六月日題奉聖㫖這厮本心欲訕君上且怒吏部不與太常用人同說假以彈劾為名實是結黨害善况這厮每所惡內直諸臣以為贊事大道好生悖肆無道著錦衣衛拿來午門前好生打四十大棍照楊爵例送鎮撫司牢固㭱著監候太常寺少卿臣周怡謹奏為感激天恩深厚竭􅅹血忱以圖報萬一事竊惟受非常之恩者當有非常之報遭希世之遇者當陳希世之義臣狂愚小臣不識大義原任吏科給事屢荷先帝知遇感激圖報於嘉靖二十二年因論輔臣嚴嵩等擅權內有先帝日事禱祀未能殄四方水旱之災致怒廷杖下錦衣衛獄㭱繫五年再逮再釋當時人皆謂臣必不免於死矣幸而免死臣母在家病危屬纊望臣一面而不可得人皆謂臣母子必不可得相見幸而相見復愈十三日乃終此皆蒙先帝非常之恩臣母子感激何可云喻臣舉家感激何可云喻臣常思粉骨糜軀何以報萬一惟朝夕仰祝聖夀萬年皇圖鞏固庶少盡愚誠而已恭遇皇上膺天景運嗣登大寶念先帝遺詔推廣德心湔滌臣罪召復臣職厯升太常寺少卿臣以五年之繫萬死之餘兩次釋放生還送母終年臣之際遇至矣極矣又得耕田而食汲井而飲二十餘年臣之殘喘餘生皆先帝之所賜皇上之所庇也臣之願望極矣足矣何敢復望收録召用此誠非常之恩希世之遇古今以來所希覩也臣當何以仰答萬一夙夜深思惟願皇上萬有千嵗永保四海之富長居九五之尊子孫千億萬邦協和庶幾臣之野心少抒萬一雖然富貴夀考子孫治安之久長者非徒然可得也必有德以享之德非徒然可有也必有道以修之學也者修德以享福祿之道也學非徒然可能也必有師以啓導之必有友以輔助之師友也者講學以修德之資也自古聖帝明王未有不由斯道以致治安者誠思法古帝王敬身修德親賢勤學以敬天勤民則天心可格人和可協太平可致而福祿可保也大臣職專輔弼師友之官也若不與大臣相接面商可否徒以揭帖進呈則精神終不流通事理終有阻礙何以作孚萬邦而感格天心自古及今未有是理古稱君臣相得如魚之得水魚不可一刻無水為人君者可數月半年不與大臣一面語乎臣實狂愚謹攄千慮一得之見列為五條開具上聞伏惟俯賜一覽存神深思無徒曰該衙門知道此非該衙門所當知者緣係感激天恩深厚竭􅅹血忱以圖報萬一事理未敢擅便謹具奏聞計開一曰定君志以修德業君道之大在乎知責任之難在君與相古聖帝明王曰后克艱厥后臣克艱厥臣又曰為君難為臣不易皆謂責任之難勝也為人君者豈天固縱之居萬夫之上得以自恣其欲自肆其情哉天地神人是主宗廟社稷是承其任甚大其責甚重此所以難也知其難則思所以圖之不可忽易古之知難者曰豫臨兆民凛乎若朽索之馭六馬兢兢業業不敢荒寧日惟稽古正學明善惡之幾辨忠邪之分曉然趨道之正在乎君志先定志欲為聖帝則必法堯舜志欲為明王則必法禹湯文武為之臣者孰敢不敬故曰君志定而天下之治成矣此之謂可久之德此之謂可大之業此之謂能稱君道矣伏惟存神二曰畏天命以消灾異人君為天下臣民之主所以奉若天道也皇矣上帝臨下有赫君道盡則天命眷之君道不盡則天命去之天命眷則天下臣民是依天命去則天下臣民是畔此天之可畏也古聖帝明王曰我其夙夜畏天之威于時保之然人君者天之所立也天心常仁愛之君道盡則三光明四時順風雨時百榖成萬民安君道不盡則天亦念之出灾異以譴告之垂戒之欲其警愓而修省之如堯之大水則曰洚水警豫洚水者洪水也湯之大旱則以六事自責今嵗水灾亦以非常在內則官民之廬舍倒壞在外則禾黍淹沒舟楫漂溺糧船損壞人民溺死非小異也近報邊墻倒卸太多一時修築實難秋髙冦警大可慮也不大警省改德徒曰修省天意不可回也必幡然改念平日之所欲者不欲平日之所為者不為勤政親賢去邪寡欲一言一動必就於正道則一念之誠上格於天灾異自消百祥來降矣伏惟存神三曰敬大臣以尊師道古之聖帝明王未有不由學而成者唐虞君臣更相戒飭君臣自相師友也湯學於伊尹武丁學於甘盤太甲成王學於伊尹周公皆學焉而後臣之宋程頥為崇政殿說書必坐殿上而講後世不知此義但以崇髙自大以威嚴臨下不復知有尊師之禮師傅保之職三公之位也三公坐而論道我祖宗朝優待三公之禮甚隆其於輔弼之臣必稱先生不敢以官名不敢以名稱一則曰先生再則曰先生每厯朝實録可考也仁宗以來未之有改也先帝世宗皇帝初年於輔臣楊廷和等猶稱先生自後一輩諂佞之臣進而始卑之矣夫敬大臣者以大臣近巳也所以自敬也尊師傅者以師傅成已之德業也所以自尊也不敬不尊則視之如羣臣等無有畏心何所警惕徒以官秩崇之祿賜厚之是不足為敬為尊也要在敬之以禮尊之以心迎之則喜送之若失遇之則親親溫言霽色商訂可否不徒以揭帖進呈如是則情意孚洽義理開明君道盡而大業成矣伏惟存神四曰擇左右以慎近習人之所居莫大乎慎所與與治同道罔不興與亂同事罔不亡故曰與君子居如入芝蘭之室久而不聞其香與之俱化矣與小人居如入鮑魚之肆久而不聞其臭亦與之俱化矣諺云近朱者赤近墨者黑此理易知也况人主左右諸欲易遂服用華侈聲色艷麗使令便辟善柔便佞充滿前後其所言者無非蕩心之言所舉動者無非肆意之事一日與居志念遂移夙夜與處染習無辨古人戒之曰不邇聲色又曰逺耆德比頑童恆舞於宫酣歌於室徇於貨色耽於音樂流於逰戲有一於此未或不亡故曰人君一日之內接賢士大夫之時多親宦官宫妾之時少則所以警省身心發紓志意德崇業廣心泰神怡樂莫大焉內臣中謹慎小心知義理識大體者亦多其善柔便佞者不少選擇而使之尤為緊要即今秋凉宜親近儒臣日講不宜暫罷伏惟存神五曰勤朝政以勑臣工古人有言一日之計在於寅一生之計在於勤故曰雞鳴而起雞鳴則寅時也業精於勤勤則有功也自古聖帝明王必憂勤惕厲一日二日萬幾不勤則荒惰晏安萬事隳矣傳曰大禹聖人乃惜寸隂至於衆人當惜分隂經曰克勤於邦又曰君子所其無逸我祖宗建無逸殿正訓以勤也常朝必於昧爽之時昧爽者晦明未辨之時也朝早則精神清爽志氣清明朝罷而退百官各有警愓得以修政立事非曰小補若於辰已時朝則百官亦有年大者守候久而精神倦未免廢事習久則百官因循懈怠惰慢自逸無怪乎政治之不古也伏惟存神隆慶元年七月日題奏南京國子監司業今升太常寺少卿臣周怡謹奏為中途患病不能赴任懇乞天恩容令回籍調理以延殘喘事臣年六十四嵗直𨽻寧國府太平縣人少生羸弱長益不知自愛重久病虛羸如羸卒好挽强弓竭力而斷筋吐血不勝任而死矣自取之也臣之遇事前無所難自反而心以為能雖千萬人吾往矣如衆方百萬前臨即孤軍深入以敵不怯但顧其理不畏其衆也如事勢甚難為人善袖手臣直當之不耻不鄙臣一念效用之心可識也然往往輒僨事敗謀多無成功徒為世笑詈而作永戒竟以此得罪幸蒙先帝鴻慈大恩置之不死五年之內再釋其生俾臣得侍彌留之母旬餘而决此恩此德何厚也此情此義何日可忘也皇上新登大寶推念先朝罪臣臣賤名亦在取中召復原任隨升秩方南太常即改北寺臣於其時亦奮不自量名為報效不知實已陷於大罪隨奉德意往海濱蒞事一年心神爽快但山箐海怪臣羸弱之軀終不勝任當時貪任其事不顧有後之難今來南都事雖無勞而積勞始發遂大不勝任去年戊辰十一月初四日得疾起送表謁陵節下又習儀拜祝萬夀節其日又上陵病軀感以饑寒遂日加重今或起或倒帶病應酬至前六月初四日一卧不復能起荷䝉鴻恩補臣提督四夷館太常寺少卿聞命躍心拜官無力志存報國氣不能前於本年七月內扶病行至揚州府地方瘦削見骨臣自度此病未有痊愈之期伏乞勑下吏部容臣回籍調理臣幸不死尚願耕鑿擊壤為太平頌臣即死亦奮志地下永為國家鎮地之鬼臣無任激切祈懇之至為此具本令義男周久安齎捧謹具奏聞伏候勑㫖訥溪奏疏
