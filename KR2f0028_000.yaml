body:
  text: 訥溪奏疏詔令奏議類二奏議之屬提要臣等謹案訥溪奏疏一卷明周怡撰怡字順之號都峰改號訥溪太平人嘉靖戊戌進士怡初居吏垣以言事忤嚴嵩廷杖下錦衣獄三年世宗感箕仙之言得與楊爵劉魁同出獄未幾以熊浹劾箕仙誣妄激世宗怒復逮入獄又二年始得釋隆慶初召為太常寺少卿又上疏忤中官外調山東按察司僉事稍遷司業仍為太常寺少卿以卒平生觸犯權幸至再至三困踣顛連僅存一息而其志百折不改徑直忠亮卓然為一代完人是集為其弟恪所編凡吏科奏疏十一篇太常奏疏二篇雖卷帙無多而生氣凛然猶足以見其梗概也卷末乞休一疏注曰李石麓相公不允上李石麓者大學士李春芳號也蓋怡放廢以後不欲再出而春芳以穆宗新政欲奬用直臣故格之不使上達然怡訖不得大用殆亦如郭公之善善歟乾隆四十五年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ce8b08c966498c674efdb0a0e3222e74a92e2d211ea3da76340d58bf639abb70
